# HTTP — redirect everything to HTTPS.
server {
    listen 80;
    server_name alumni.man2yogyakarta.sch.id;
    return 301 https://$host$request_uri;
}

# HTTPS — reverse proxy to the Tracer PHP container (127.0.0.1:6473).
server {
    listen 443 ssl http2;
    server_name alumni.man2yogyakarta.sch.id;

    ssl_certificate     /etc/letsencrypt/live/alumni.man2yogyakarta.sch.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alumni.man2yogyakarta.sch.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Alumni photo uploads.
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:6473;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
