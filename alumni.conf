server {
    listen 80;
    server_name alumni.man2yogyakarta.sch.id;

    # Alumni photo uploads — bump if larger images are expected.
    client_max_body_size 20M;

    # Reverse proxy → the Tracer PHP container (docker compose: web, bound to
    # 127.0.0.1:6473). Plain PHP app, so one location is enough.
    location / {
        proxy_pass         http://127.0.0.1:6473;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
